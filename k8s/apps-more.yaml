---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logdemo-rust
  namespace: ebpflogs
  labels:
    app: logdemo-rust
    demo: log-enrichment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logdemo-rust
  template:
    metadata:
      labels:
        app: logdemo-rust
        demo: log-enrichment
    spec:
      containers:
        - name: logdemo-rust
          image: __IMAGE_RUST__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8086
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: logdemo-rust
  namespace: ebpflogs
spec:
  selector:
    app: logdemo-rust
  ports:
    - name: http
      port: 8086
      targetPort: http
