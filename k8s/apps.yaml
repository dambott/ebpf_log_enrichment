apiVersion: apps/v1
kind: Deployment
metadata:
  name: logdemo-go
  namespace: ebpflogs
  labels:
    app: logdemo-go
    demo: log-enrichment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logdemo-go
  template:
    metadata:
      labels:
        app: logdemo-go
        demo: log-enrichment
    spec:
      containers:
        - name: logdemo-go
          image: __IMAGE_GO__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: traffic
          image: curlimages/curl:8.5.0
          command: ["/bin/sh", "-ec"]
          args:
            - |
              sleep 45
              while true; do
                MIN=$(date +%M)
                if [ $((MIN % 2)) -eq 0 ]; then
                  EXTRA=""
                  echo "unprimed traffic (minute ${MIN})"
                else
                  EXTRA='-H traceparent: 00-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa-bbbbbbbbbbbbbbbb-01'
                  echo "primed traffic (minute ${MIN})"
                fi
                for target in logdemo-go:8080 logdemo-java:8081 logdemo-python:8082 logdemo-node:8083 logdemo-ruby:8084 logdemo-dotnet:8085; do
                  name=${target%%:*}
                  port=${target##*:}
                  url="http://${name}.ebpflogs.svc.cluster.local:${port}/work"
                  curl -sf -H 'Connection: close' ${EXTRA} "${url}" && echo "  ok ${name}" || echo "  FAIL ${name}"
                done
                sleep 60
              done
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: logdemo-go
  namespace: ebpflogs
spec:
  selector:
    app: logdemo-go
  ports:
    - name: http
      port: 8080
      targetPort: http
---
